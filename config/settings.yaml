# ===============================
# AUTO JOB APPLIER - Application Settings
# ===============================

app:
  name: "Auto Job Applier"
  version: "1.0.0"
  daily_application_target: 10
  max_daily_applications: 25
  headless_browser: true
  slow_mode_ms: 500
  screenshot_on_error: true
  screenshot_on_success: true
  retry_failed: true
  max_retries: 2
  log_level: "INFO"
  blacklist_companies: []

ai:
  provider: "gemini"
  gemini:
    api_key: "PASTE_YOUR_GEMINI_KEY_HERE"
    model: "gemini-2.0-flash"
    max_requests_per_minute: 15
    max_requests_per_day: 1500
    temperature: 0.3
  ollama:
    base_url: "http://localhost:11434"
    model: "llama3.1:8b"
  groq:
    api_key: ""
    model: "llama-3.1-70b-vertex"

browser:
  type: "chromium"
  user_data_dir: "data/browser_profile"
  viewport_width: 1920
  viewport_height: 1080
  timeout_ms: 30000
  navigation_timeout_ms: 60000
  stealth_mode: true
  random_delays: true
  min_delay_ms: 800
  max_delay_ms: 3000
  proxy:
    enabled: false
    server: ""
    username: ""
    password: ""

database:
  path: "data/applications.db"

portals:
  linkedin:
    enabled: true
    base_url: "https://www.linkedin.com"
    jobs_url: "https://www.linkedin.com/jobs/search/?keywords=Healthcare%20-%20RCM%20%7C%20%20MedTech%20Solutions%20Architect%20%7C%20Revenue%20Cycle%20Automation%20%7C%20Healthcare%20AI%20SME&geoId=92000000"
    max_applications_per_day: 5
    easy_apply_only: false
    use_saved_session: true

  naukri:
    enabled: true
    base_url: "https://www.naukri.com"
    jobs_url: "https://www.naukri.com/Healthcare-RCM-MedTech-Solutions-Architect-Revenue-Cycle-Automation-Healthcare-AI-SME-jobs"
    max_applications_per_day: 5
    use_saved_session: true

  wellfound:
    enabled: true
    base_url: "https://wellfound.com"
    jobs_url: "https://wellfound.com/jobs?query=Healthcare%20RCM%2C%20MedTech%20Solutions%20Architect%2C%20Revenue%20Cycle%20Automation%2C%20Healthcare%20AI%20SME"
    max_applications_per_day: 3
    use_saved_session: true

  instahyre:
    enabled: true
    base_url: "https://www.instahyre.com"
    jobs_url: "https://www.instahyre.com/jobs?query=Healthcare%20RCM%20MedTech%20Solutions%20Architect%20Revenue%20Cycle%20Automation%20Healthcare%20AI%20SME"
    max_applications_per_day: 3
    use_saved_session: true

  generic_career_page:
    enabled: true
    max_applications_per_day: 5
    company_career_urls: []

scheduler:
  enabled: true
  cron_expression: "0 9 * * *"
  interval_hours: 24
  timezone: "Asia/Kolkata"

notifications:
  enabled: true
  email:
    enabled: false
    smtp_server: "smtp.gmail.com"
    smtp_port: 587
    sender_email: ""
    sender_password: ""
    recipient_email: ""
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""
  desktop:
    enabled: true

logging:
  dir: "logs"
  max_file_size_mb: 10
  backup_count: 5
  format: "%(asctime)s | %(levelname)-8s | %(name)-25s | %(message)s"

reporting:
  google_sheets:
    enabled: true
    sheet_id: ""
  csv:
    enabled: true
    path: "data/applications_export.csv"
    daily_reports_dir: "data/daily_reports"