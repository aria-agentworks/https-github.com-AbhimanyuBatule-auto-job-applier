# ============================================================
# AUTO JOB APPLIER - Application Settings
# ============================================================

app:
  name: "Auto Job Applier"
  version: "1.0.0"
  daily_application_target: 10
  max_daily_applications: 25
  headless_browser: true  # Set false for debugging
  slow_mode_ms: 500       # Milliseconds between actions (anti-detection)
  screenshot_on_error: true
  screenshot_on_success: true
  retry_failed: true
  max_retries: 2
  log_level: "INFO"       # DEBUG, INFO, WARNING, ERROR

  # Company blacklist - skip applications to these companies
  blacklist_companies: []
  # Example:
  # blacklist_companies:
  #   - "Scam Corp"
  #   - "Company I Already Work At"

# AI Configuration (Google Gemini Free Tier)
ai:
  provider: "gemini"  # gemini / ollama / groq
  gemini:
    api_key: ""  # Get from https://aistudio.google.com/app/apikey
    model: "gemini-2.0-flash"  # Free tier model
    max_requests_per_minute: 15
    max_requests_per_day: 1500
    temperature: 0.3
  ollama:
    base_url: "http://localhost:11434"
    model: "llama3.1:8b"
  groq:
    api_key: ""
    model: "llama-3.1-70b-versatile"

# Browser Configuration
browser:
  type: "chromium"  # chromium / firefox / webkit
  user_data_dir: "data/browser_profile"  # Persist login sessions!
  viewport_width: 1920
  viewport_height: 1080
  timeout_ms: 30000
  navigation_timeout_ms: 60000
  # Anti-detection
  stealth_mode: true
  random_delays: true
  min_delay_ms: 800
  max_delay_ms: 3000
  # Proxy (optional)
  proxy:
    enabled: false
    server: ""
    username: ""
    password: ""

# Database
database:
  path: "data/applications.db"

# Portal-specific settings
portals:
  linkedin:
    enabled: true
    base_url: "https://www.linkedin.com"
    jobs_url: "https://www.linkedin.com/jobs/search/"
    max_applications_per_day: 5
    easy_apply_only: false  # Set true to only use Easy Apply
    # Login via saved browser session (login once manually)
    use_saved_session: true

  naukri:
    enabled: true
    base_url: "https://www.naukri.com"
    jobs_url: "https://www.naukri.com/mnjuser/homepage"
    max_applications_per_day: 5
    use_saved_session: true

  wellfound:
    enabled: true
    base_url: "https://wellfound.com"
    jobs_url: "https://wellfound.com/jobs"
    max_applications_per_day: 3
    use_saved_session: true

  instahyre:
    enabled: true
    base_url: "https://www.instahyre.com"
    max_applications_per_day: 3
    use_saved_session: true

  hirist:
    enabled: false
    base_url: "https://www.hirist.tech"
    max_applications_per_day: 3

  otta:
    enabled: false
    base_url: "https://otta.com"
    max_applications_per_day: 2

  seek:
    enabled: false
    base_url: "https://www.seek.com.au"
    max_applications_per_day: 2

  generic_career_page:
    enabled: true
    max_applications_per_day: 5
    # URLs of company career pages to monitor
    company_career_urls: []

# Scheduler
scheduler:
  enabled: true
  # Run at 9 AM daily
  cron_expression: "0 9 * * *"
  # Or interval in hours
  interval_hours: 24
  timezone: "Asia/Kolkata"

# Notifications
notifications:
  enabled: true
  # Daily summary email
  email:
    enabled: false
    smtp_server: "smtp.gmail.com"
    smtp_port: 587
    sender_email: ""
    sender_password: ""  # Use app password
    recipient_email: ""
  # Telegram bot
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""
  # Desktop notification
  desktop:
    enabled: true

# Logging
logging:
  dir: "logs"
  max_file_size_mb: 10
  backup_count: 5
  format: "%(asctime)s | %(levelname)-8s | %(name)-25s | %(message)s"

# ── Reporting / Google Sheets ──────────────────────────────────
# Automatically syncs every application to a Google Sheet so you
# can see what was applied, when, status, match score, etc.
reporting:
  google_sheets:
    enabled: true
    sheet_id: ""  # The ID from your Google Sheet URL (or GOOGLE_SHEET_ID env var)
    # Service account creds JSON at: data/google_sheets_creds.json
    # See README for setup instructions
  csv:
    enabled: true  # Always export CSV as fallback
    path: "data/applications_export.csv"
    daily_reports_dir: "data/daily_reports"
